<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex" />
<title>Rodrigo Dantas</title>
<!-- GitHub Pages serves this for any unmatched path. It doubles as the language
     URL router: /pt, /en and /es map to the matching ?lang= and bounce home
     (/br is kept as a legacy alias for Portuguese). Anything else goes to the
     homepage (English, or the visitor's saved language). -->
<script>
  (function () {
    var seg = location.pathname.replace(/^\/+/, "").split("/")[0].toLowerCase();
    var lang = { pt: "pt", en: "en", es: "es", br: "pt" }[seg];
    if (lang) {
      try { localStorage.setItem("lang", lang); } catch (e) {}
      location.replace("/?lang=" + lang);
    } else {
      location.replace("/");
    }
  })();
</script>
<meta http-equiv="refresh" content="0; url=/" />
</head>
<body>Redirecting to <a href="/">napalm23zero.github.io</a>…</body>
</html>
